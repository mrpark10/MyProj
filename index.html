<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정통 19x19 AI 바둑 게임</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c2c2c;
            color: white;
            margin: 0;
            padding: 20px;
        }
        h1 { margin-bottom: 5px; color: #f0f0f0; }
        .score-board {
            display: flex;
            gap: 20px;
            font-size: 1.1rem;
            margin-bottom: 10px;
            background: #3c3c3c;
            padding: 8px 20px;
            border-radius: 20px;
        }
        #status {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 12px;
            color: #ffcc00;
        }
        #board-container {
            position: relative;
            background-color: #e4a751;
            padding: 15px;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas { cursor: pointer; display: block; }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 18px;
            font-size: 0.95rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-pass { background-color: #f39c12; color: white; }
        .btn-resign { background-color: #e74c3c; color: white; }
        .btn-score { background-color: #2ecc71; color: white; }
        .btn-reset { background-color: #3498db; color: white; }
        button:hover { opacity: 0.85; }
    </style>
</head>
<body>

    <h1>⚫ 정통 19x19 AI 바둑 ⚪</h1>
    
    <div class="score-board">
        <span>🖤 잡은 돌: <b id="captures-black">0</b></span>
        <span>🤍 잡은 돌: <b id="captures-white">0</b> (덤 +6.5)</span>
    </div>

    <div id="status">당신의 차례입니다 (흑돌 🖤)</div>
    
    <div id="board-container">
        <canvas id="board" width="650" height="650"></canvas>
    </div>

    <div class="controls">
        <button class="btn-pass" onclick="handlePass()">패스 (Pass)</button>
        <button class="btn-score" onclick="handleScoring()">계가 하기</button>
        <button class="btn-resign" onclick="handleResign()">불계패 (기권)</button>
        <button class="btn-reset" onclick="resetGame()">새 게임</button>
    </div>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        
        const GRID_SIZE = 19;
        const CELL_SIZE = canvas.width / (GRID_SIZE + 1);
        const KOMI = 6.5; // 백 덤

        let board = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(0));
        let captures = { 1: 0, 2: 0 }; // 1: 흑이 잡은 백돌, 2: 백이 잡은 흑돌
        let isPlayerTurn = true;
        let gameOver = false;
        let lastKo = null; // 패(Ko) 위치 저장
        let consecutivePasses = 0;
        let territoryOverlay = null; // 계가 표시용 데이터

        // 바둑판 초기화 & 그리기
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1.2;

            // 격자선
            for (let i = 0; i < GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(CELL_SIZE * (i + 1), CELL_SIZE);
                ctx.lineTo(CELL_SIZE * (i + 1), canvas.height - CELL_SIZE);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(CELL_SIZE, CELL_SIZE * (i + 1));
                ctx.lineTo(canvas.width - CELL_SIZE, CELL_SIZE * (i + 1));
                ctx.stroke();
            }

            // 화점
            const dots = [3, 9, 15];
            ctx.fillStyle = '#111';
            dots.forEach(x => {
                dots.forEach(y => {
                    ctx.beginPath();
                    ctx.arc(CELL_SIZE * (x + 1), CELL_SIZE * (y + 1), 3.5, 0, Math.PI * 2);
                    ctx.fill();
                });
            });

            // 계가 집 표시 Overlay
            if (territoryOverlay) {
                for (let r = 0; r < GRID_SIZE; r++) {
                    for (let c = 0; c < GRID_SIZE; c++) {
                        const owner = territoryOverlay[r][c];
                        if (owner !== 0) {
                            const x = CELL_SIZE * (c + 1);
                            const y = CELL_SIZE * (r + 1);
                            ctx.fillStyle = owner === 1 ? 'rgba(0,0,0,0.45)' : 'rgba(255,255,255,0.65)';
                            ctx.fillRect(x - 8, y - 8, 16, 16);
                        }
                    }
                }
            }

            // 돌 그리기
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (board[r][c] !== 0) {
                        drawStone(r, c, board[r][c]);
                    }
                }
            }

            document.getElementById('captures-black').innerText = captures[1];
            document.getElementById('captures-white').innerText = captures[2];
        }

        function drawStone(row, col, color) {
            const x = CELL_SIZE * (col + 1);
            const y = CELL_SIZE * (row + 1);
            const radius = CELL_SIZE * 0.43;

            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            
            const gradient = ctx.createRadialGradient(x - radius/3, y - radius/3, radius/10, x, y, radius);
            if (color === 1) {
                gradient.addColorStop(0, '#555');
                gradient.addColorStop(1, '#000');
            } else {
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(1, '#dcdcdc');
            }
            ctx.fillStyle = gradient;
            ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
            ctx.shadowBlur = 3;
            ctx.fill();
            ctx.shadowColor = 'transparent';
        }

        // ==========================================
        // ⚔️ 바둑 규칙 엔진 (활로, 포로, 착수금지)
        // ==========================================
        function getGroup(r, c, color, visited = new Set()) {
            const key = `${r},${c}`;
            if (visited.has(key)) return { stones: [], liberties: new Set() };
            visited.add(key);

            let stones = [{ r, c }];
            let liberties = new Set();
            const dirs = [[0, 1], [1, 0], [0, -1], [-1, 0]];

            for (let [dr, dc] of dirs) {
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE) {
                    if (board[nr][nc] === 0) {
                        liberties.add(`${nr},${nc}`);
                    } else if (board[nr][nc] === color) {
                        const res = getGroup(nr, nc, color, visited);
                        stones = stones.concat(res.stones);
                        res.liberties.forEach(l => liberties.add(l));
                    }
                }
            }
            return { stones, liberties };
        }

        function playMove(r, c, color) {
            if (board[r][c] !== 0 || gameOver) return false;
            if (lastKo && lastKo.r === r && lastKo.c === c) return false; // 패(Ko) 금지

            board[r][c] = color;
            const opponent = color === 1 ? 2 : 1;
            const dirs = [[0, 1], [1, 0], [0, -1], [-1, 0]];
            let capturedStones = [];

            // 상대 돌 잡기 확인
            dirs.forEach(([dr, dc]) => {
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE && board[nr][nc] === opponent) {
                    const group = getGroup(nr, nc, opponent);
                    if (group.liberties.size === 0) {
                        capturedStones = capturedStones.concat(group.stones);
                    }
                }
            });

            // 포로 제거
            capturedStones.forEach(s => { board[s.r][s.c] = 0; });
            captures[color] += capturedStones.length;

            // 본인 그룹 활로 확인 (자충수 금지)
            const myGroup = getGroup(r, c, color);
            if (myGroup.liberties.size === 0) {
                board[r][c] = 0; // 되돌리기
                captures[color] -= capturedStones.length;
                return false; 
            }

            // 패(Ko) 상태 등록
            if (capturedStones.length === 1 && myGroup.stones.length === 1 && myGroup.liberties.size === 1) {
                lastKo = capturedStones[0];
            } else {
                lastKo = null;
            }

            consecutivePasses = 0;
            return true;
        }

        // 마우스 클릭 이벤트
        canvas.addEventListener('click', (e) => {
            if (!isPlayerTurn || gameOver) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const col = Math.round(x / CELL_SIZE) - 1;
            const row = Math.round(y / CELL_SIZE) - 1;

            if (row >= 0 && row < GRID_SIZE && col >= 0 && col < GRID_SIZE) {
                if (playMove(row, col, 1)) {
                    drawBoard();
                    isPlayerTurn = false;
                    statusDiv.innerText = "🧠 AI가 수순을 계산 중입니다...";
                    setTimeout(aiMove, 300);
                }
            }
        });

        // ==========================================
        // 🤖 스마트 AI 바둑 구현
        // ==========================================
        function aiMove() {
            if (gameOver) return;

            let bestScore = -Infinity;
            let bestMove = null;

            // AI 착수 후보군 계산
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (board[r][c] === 0) {
                        // 가상 수 시뮬레이션
                        if (playMove(r, c, 2)) {
                            let score = evaluatePosition(r, c);
                            board[r][c] = 0; // 가상 착수 복원 (간단 시뮬레이션)

                            if (score > bestScore) {
                                bestScore = score;
                                bestMove = { r, c };
                            }
                        }
                    }
                }
            }

            if (bestMove && bestScore > 5) {
                playMove(bestMove.r, bestMove.c, 2);
                drawBoard();
                isPlayerTurn = true;
                statusDiv.innerText = "당신의 차례입니다 (흑돌 🖤)";
            } else {
                // 둘 곳이 마땅치 않거나 불리할 때 패스
                handlePass(true);
            }
        }

        function evaluatePosition(r, c) {
            // 연결, 상대 돌 단수(Atari) 가치 평가
            let score = Math.random() * 5; 
            const dirs = [[0,1],[1,0],[0,-1],[-1,0]];
            dirs.forEach(([dr, dc]) => {
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE) {
                    if (board[nr][nc] === 1) score += 10; // 공격
                    if (board[nr][nc] === 2) score += 8;  // 연결
                }
            });
            return score;
        }

        // ==========================================
        // 🏁 계가 (Territory Calculation) & 버튼 시스템
        // ==========================================
        function handlePass(isAi = false) {
            if (gameOver) return;
            consecutivePasses++;
            
            if (isAi) {
                statusDiv.innerText = "🤖 AI가 패스(Pass)했습니다. 당신의 차례입니다.";
                isPlayerTurn = true;
            } else {
                statusDiv.innerText = "당신이 패스했습니다.";
                if (consecutivePasses >= 2) {
                    alert("양 플레이어 연속 패스로 계가(집 계산)를 진행합니다.");
                    handleScoring();
                    return;
                }
                isPlayerTurn = false;
                setTimeout(aiMove, 400);
            }
        }

        function handleResign() {
            if (gameOver) return;
            if (confirm("정말 기권(불계패) 하시겠습니까?")) {
                gameOver = true;
                statusDiv.innerText = "🏳️ 당신이 기권하였습니다. 백(AI) 불계승!";
            }
        }

        function handleScoring() {
            gameOver = true;
            territoryOverlay = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(0));

            let blackTerritory = 0;
            let whiteTerritory = 0;
            let visited = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(false));

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (board[r][c] === 0 && !visited[r][c]) {
                        // 영역 Flood Fill
                        let region = [];
                        let queue = [{ r, c }];
                        visited[r][c] = true;
                        let touchesBlack = false;
                        let touchesWhite = false;

                        while (queue.length > 0) {
                            let curr = queue.pop();
                            region.push(curr);

                            const dirs = [[0,1],[1,0],[0,-1],[-1,0]];
                            dirs.forEach(([dr, dc]) => {
                                let nr = curr.r + dr, nc = curr.c + dc;
                                if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE) {
                                    if (board[nr][nc] === 1) touchesBlack = true;
                                    else if (board[nr][nc] === 2) touchesWhite = true;
                                    else if (!visited[nr][nc]) {
                                        visited[nr][nc] = true;
                                        queue.push({ r: nr, c: nc });
                                    }
                                }
                            });
                        }

                        // 단독으로 둘러싸인 집 판단
                        if (touchesBlack && !touchesWhite) {
                            blackTerritory += region.length;
                            region.forEach(pt => territoryOverlay[pt.r][pt.c] = 1);
                        } else if (touchesWhite && !touchesBlack) {
                            whiteTerritory += region.length;
                            region.forEach(pt => territoryOverlay[pt.r][pt.c] = 2);
                        }
                    }
                }
            }

            drawBoard();

            // 최종 점수합산 (집 + 잡은 돌 + 덤)
            const finalBlack = blackTerritory + captures[1];
            const finalWhite = whiteTerritory + captures[2] + KOMI;

            let resultMsg = `[ 계가 결과 ]\n\n` +
                `🖤 흑(플레이어): ${finalBlack}집 (집: ${blackTerritory} + 포로: ${captures[1]})\n` +
                `🤍 백(AI): ${finalWhite}집 (집: ${whiteTerritory} + 포로: ${captures[2]} + 덤: ${KOMI})\n\n`;

            if (finalBlack > finalWhite) {
                resultMsg += `🎉 흑(플레이어)이 ${(finalBlack - finalWhite).toFixed(1)}집 차이로 승리했습니다!`;
            } else {
                resultMsg += `🤖 백(AI)이 ${(finalWhite - finalBlack).toFixed(1)}집 차이로 승리했습니다!`;
            }

            alert(resultMsg);
            statusDiv.innerText = "게임 종료 - " + (finalBlack > finalWhite ? "흑 승리!" : "백 승리!");
        }

        function resetGame() {
            board = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(0));
            captures = { 1: 0, 2: 0 };
            isPlayerTurn = true;
            gameOver = false;
            lastKo = null;
            consecutivePasses = 0;
            territoryOverlay = null;
            statusDiv.innerText = "당신의 차례입니다 (흑돌 🖤)";
            drawBoard();
        }

        drawBoard();
    </script>
</body>
</html>
